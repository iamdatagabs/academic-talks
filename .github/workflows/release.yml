name: Release Slides (Zenodo-ready)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Compilar LaTeX (garantido)
      - name: Compile LaTeX (Beamer)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 2026/ia-geografia-ufv/slides.tex
          latexmk_use_xelatex: true

      # 3. Debug completo (descobre onde o PDF realmente está)
      - name: Debug file tree
        run: find . -type f

      # 4. Criar pasta de release padronizada
      - name: Prepare release assets
        run: |
          mkdir -p release
          PDF_PATH=$(find . -name "slides.pdf" | head -n 1)

          if [ -z "$PDF_PATH" ]; then
            echo "❌ slides.pdf not found"
            exit 1
          fi

          echo "✅ Found PDF at: $PDF_PATH"
          cp "$PDF_PATH" release/slides.pdf

      # 5. Verificação forte
      - name: Verify release assets
        run: ls -lh release/

      # 6. Criar Release (ZENODO CAPTURA AQUI)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Academic Talks - ${{ github.ref_name }}"
          body: |
            📄 Presentation UFV
            👤 Author: Gabriel Passos
            🔗 ORCID: https://orcid.org/0000-0000-0000-0000
            📦 Auto-generated release for Zenodo DOI
          files: |
            release/slides.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
