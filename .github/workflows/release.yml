name: Release Slides (Zenodo-ready)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Compilar LaTeX (Beamer)
      - name: Compile LaTeX (Beamer)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 2026/ia-geografia-ufv/slides.tex
          latexmk_use_xelatex: true

      # 3. Debug file tree
      - name: Debug file tree
        run: find . -type f

      # 4. Preparar assets da release (CORRIGIDO)
      - name: Prepare release assets
        run: |
          mkdir -p release

          if [ ! -f "slides.pdf" ]; then
            echo "❌ slides.pdf not found in root"
            find . -name "*.pdf"
            exit 1
          fi

          echo "✅ Found slides.pdf in root"
          cp slides.pdf release/slides.pdf

      # 5. Verificação
      - name: Verify release assets
        run: ls -lh release/

      # 6. Criar GitHub Release (Zenodo captura aqui)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Academic Talks - ${{ github.ref_name }}"
          body: |
            📄 Presentation UFV
            👤 Author: Gabriel Passos
            🔗 ORCID: https://orcid.org/0000-0001-5813-7462
            📦 Auto-generated release for Zenodo DOI
          files: |
            release/slides.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
