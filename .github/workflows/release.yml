name: Release Slides (Zenodo-ready)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX (FINAL BUILD)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 2026/ia-geografia-ufv/slides.tex
          latexmk_use_xelatex: true

      - name: Verify PDF exists
        run: |
          if [ ! -f "2026/ia-geografia-ufv/slides.pdf" ]; then
            echo "PDF not found"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Slides ${{ github.ref_name }}"
          files: 2026/ia-geografia-ufv/slides.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
