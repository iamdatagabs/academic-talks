name: Release Slides (Zenodo-ready)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Build LaTeX FORÇANDO output no root
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 2026/ia-geografia-ufv/slides.tex
          latexmk_use_xelatex: true

      # 2. DEBUG REAL (onde o PDF foi parar)
      - name: Find PDF
        run: find . -name "*.pdf"

      # 3. Mover PDF para raiz (GARANTIA ABSOLUTA)
      - name: Move PDF to root
        run: |
          mkdir -p release_files
          cp $(find . -name "slides.pdf") release_files/slides.pdf

      # 4. Verificação forte
      - name: Verify PDF
        run: ls -lh release_files/

      # 5. Criar release com caminho garantido
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Slides ${{ github.ref_name }}"
          files: release_files/slides.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
