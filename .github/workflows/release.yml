name: Release Slides (Zenodo-ready)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Build LaTeX
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: slides.tex
          working_directory: 2026/ia-geografia-ufv
          latexmk_use_xelatex: true

      # 3. DEBUG CRÍTICO (vamos ver onde o PDF realmente está)
      - name: Find PDF location
        run: find . -name "*.pdf"

      # 4. Garantir existência (fail fast)
      - name: Verify PDF exists
        run: |
          if [ ! -f "2026/ia-geografia-ufv/slides.pdf" ]; then
            echo "PDF not found!"
            exit 1
          fi

      # 5. Criar release com path ABSOLUTO garantido
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Slides ${{ github.ref_name }}"
          files: |
            2026/ia-geografia-ufv/slides.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
